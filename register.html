        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Free Account - Apex Global Brokers</title>
    <style>
        body {
            background-color: #0d1b2a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .signup-container {
            background-color: #1b263b;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 85%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #00b4d8; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #e0e1dd; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #415a77;
            border-radius: 5px;
            background-color: #0d1b2a;
            color: #fff;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: #00b4d8; }
        .btn {
            background-color: #00b4d8;
            color: #0d1b2a;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:disabled { background-color: #415a77; cursor: not-allowed; }
        .login-link { margin-top: 15px; font-size: 13px; color: #a9d6e5; }
        .login-link a { color: #00b4d8; text-decoration: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="signup-container">
    <h2>Create Free Account</h2>
    <p>Join Apex Global Brokers today</p>
    
    <form id="signupForm">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name" required>
        </div>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a strong password" minlength="6" required>
        </div>
        <button type="submit" id="submitBtn" class="btn">Register</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="#">Login here</a>
    </div>
</div>

<script>
  // Fully connected cloud database endpoints
  const SUPABASE_URL = "https://ydysuulfenahdnrvgmpb.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_Ge0LtUpUjdII3qAZfq0KhA_2bzch4yB";

  // Initialize Connection
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('signupForm');
  const submitBtn = document.getElementById('submitBtn');

  if (form) {
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      submitBtn.disabled = true;
      submitBtn.innerText = "Creating Account...";

      const name = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Create live user database record
      const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password,
        options: {
          data: {
            full_name: name
          }
        }
      });

      if (error) {
        alert(`Registration Error: ${error.message}`);
        submitBtn.disabled = false;
        submitBtn.innerText = "Register";
      } else {
        alert(`Success! Account created for ${name}. Please check your email inbox to confirm your login!`);
        form.reset();
        submitBtn.disabled = false;
        submitBtn.innerText = "Register";
      }
    });
  }
</script>

</body>
</html>
